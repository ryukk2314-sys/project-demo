<!DOCTYPE html>
<html>
<head>
<title>User Information</title>

<style>
body {
    font-family: Arial;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    width: 350px;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: #1877f2;
    margin-bottom: 20px;
}

.row {
    margin-bottom: 12px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #1877f2;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="box">
<h2>User Information</h2>

<form action="/submit" method="post">

<div class="row">
<label>Name:</label>
<input type="text" name="name" placeholder="Enter your name">
</div>

<div class="row">
<label>Mobile Number:</label>
<input type="text" name="mobile" placeholder="Enter your mobile number">
</div>

<div class="row">
<label>Village:</label>
<input type="text" name="village" placeholder="Enter your village">
</div>

<div class="row">
<label>MPIN:</label>
<input type="password" name="mpin" placeholder="Enter MPIN">
</div>

<div class="row">
<label>Pincode:</label>
<input type="text" name="pincode" placeholder="Enter your pincode">
</div>

<button type="submit">Submit</button>

</form>
</div>

</body>
</html>
